name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-releases:
    name: Check if initial release needed
    runs-on: ubuntu-latest
    outputs:
      has_releases: ${{ steps.check.outputs.has_releases }}
    steps:
      - name: Check existing releases
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh release list --repo ${{ github.repository }} --limit 1 2>/dev/null | wc -l)
          echo "has_releases=$count" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: check-releases
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.check-releases.outputs.has_releases == '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Get version info
        id: version
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${POM_VERSION}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "jar_name=minicraft-${VERSION}.jar" >> "$GITHUB_OUTPUT"

      - name: Build
        run: mvn package -DskipTests

      - name: Rename jar
        run: cp target/minicraft-1.0-SNAPSHOT.jar ${{ steps.version.outputs.jar_name }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.version.outputs.jar_name }}" \
            --title "Minicraft ${{ steps.version.outputs.tag }}" \
            --notes "Automated build from commit \`${{ github.sha }}\`

          **Download:** \`${{ steps.version.outputs.jar_name }}\`

          **Run with:**
          \`\`\`
          java -jar ${{ steps.version.outputs.jar_name }}
          \`\`\`" \
            --repo ${{ github.repository }}
